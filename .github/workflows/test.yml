name: C Tests

on:
  push:
    branches: [ main, master, development, test, issue-15 ]
  pull_request:
    branches: [ main, master, development, test, issue-15 ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y gcc make gcov
    
    - name: Run tests
      run: cd src && make test
    
    - name: Generate coverage report
      if: always()
      run: |
        cd src
        gcov *.gcda 2>&1 || echo "Coverage generation failed"
        echo ""
        echo "=== Coverage Summary ==="
        cat helloworld.c.gcov 2>/dev/null | head -20 || echo "No coverage files found"
    
    - name: Upload coverage files
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: |
          src/*.gcov
          src/*.gcda
          src/*.gcno
          src/testhelloworld
