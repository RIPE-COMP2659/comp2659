name: C Tests

on:
  pull_request:
    branches: [ production, development, test ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: (process) Checkout code
      uses: actions/checkout@v3
    
    - name: (process) Install dependencies
      run: sudo apt-get update && sudo apt-get install -y gcc make valgrind
    
    - name: -> Tests & Code Coverage <-
      run: cd .github/workflows && chmod +x automations.sh && ./automations.sh
