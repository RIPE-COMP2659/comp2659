name: C Tests

on:
  push:
    branches: [ main, master, development, test, issue-15 ]
  pull_request:
    branches: [ main, master, development, test, issue-15 ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: (process) Checkout code
      uses: actions/checkout@v3
    
    - name: (process) Install dependencies
      run: sudo apt-get update && sudo apt-get install -y gcc make
    
    - name: -> Tests & Code Coverage <-
      run: cd src && make generate-coverage
    
    - name: Code coverage summary
      if: always()
      run: |
        cd src
        echo "=== Test & Coverage Summary ==="
        cat helloworld.c.gcov 2>/dev/null | head -20 || echo "No coverage files found"
    
    - name: (process) Upload test results and coverage
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: (process) test-results-and-coverage
        path: |
          src/*.gcov
          src/*.gcda
          src/*.gcno
