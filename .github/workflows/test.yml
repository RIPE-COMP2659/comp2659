name: C Tests

on:
  pull_request:
    branches: [ production, development, test ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: (process) Checkout code
      uses: actions/checkout@v3

      run: sudo apt-get update && sudo apt-get install -y gcc make valgrind pandoc

    - name: -> Tests & Code Coverage <-
      run: cd .github/workflows && chmod +x automations.sh && ./automations.sh

    - name: (process) Upload SPECIFICATIONS.docx
      uses: actions/upload-artifact@v4
      with:
        name: (process) SPECIFICATIONS.docx
        path: RIPE_SPECIFICATIONS.docx
