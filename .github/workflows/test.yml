name: C Tests

on:
  push:
    branches: [ issue-33 ]
  pull_request:
    branches: [ production, development, test, issue-33 ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: (process) Checkout code
      uses: actions/checkout@v3
    
    - name: (process) Install dependencies
      run: sudo apt-get update && sudo apt-get install -y gcc make valgrind
    
    - name: -> Tests & Code Coverage <-
      run: cd .github/workflows && chmod +x automations.sh && ./automations.sh
    
    - name: (process) Upload test results and coverage
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: (process) test-results-and-coverage
        path: |
          src/*.gcov
