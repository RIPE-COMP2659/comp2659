name: C Tests

on:
  pull_request:
    branches: [ production, development, test ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: (process) Checkout code
      uses: actions/checkout@v3
    
    - name: (process) Install dependencies
      run: sudo apt-get update && sudo apt-get install -y gcc make
    
    - name: -> Tests & Code Coverage <-
      run: cd src && make coverage
    
    - name: Code coverage summary
      if: always()
      run: |
        cd src
        echo "=== Test & Coverage Summary ==="
        if ls *.gcov 1> /dev/null 2>&1; then
          for file in *.gcov; do
            echo "--- $file ---"
            cat "$file" | head -20
            echo ""
          done
        else
          echo "No coverage files found"
        fi
    
    - name: (process) Upload test results and coverage
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: (process) test-results-and-coverage
        path: |
          src/*.gcov
